# Read the Docs configuration file
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# This single config is used by BOTH RTD projects:
#   - backtrader        (English)  → READTHEDOCS_LANGUAGE=en  (default)
#   - backtrader-zh     (Chinese)  → READTHEDOCS_LANGUAGE=zh
#
# conf.py auto-detects the language via READTHEDOCS_LANGUAGE and switches
# root_doc / master_doc / html_title accordingly.
#
# To set up the Chinese project on RTD:
#   1. Create a new RTD project named "backtrader-zh"
#   2. Point it to the same GitHub repo (cloudQuant/backtrader)
#   3. In project Settings → General → Language, choose "Chinese"
#   4. RTD will set READTHEDOCS_LANGUAGE=zh during builds
#   5. conf.py will build from index_zh.rst automatically

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/source/conf.py
  builder: html
  fail_on_warning: false

formats:
  - pdf
  - epub

python:
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .
      extra_requirements:
        - docs
