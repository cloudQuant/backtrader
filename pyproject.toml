[tool.black]
line-length = 100
target-version = ["py38", "py39", "py310", "py311", "py312", "py313"]
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.mypy]
python_version = "3.8"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = false
implicit_reexport = false
strict_equality = true
show_error_codes = true
ignore_missing_imports = true

# Per-module overrides for framework/legacy patterns that are difficult to fix
# without major refactoring. These modules use dynamic attributes, metaclass-like
# patterns, and descriptor-based params - we disable the noisiest codes while
# keeping useful checks (union-attr, arg-type, return-value, etc.)
[[tool.mypy.overrides]]
module = [
    "backtrader.metabase",
    "backtrader.feed",
    "backtrader.parameters",
    "backtrader.resamplerfilter",
    "backtrader.indicator",
    "backtrader.dataseries",
    "backtrader.observer",
    "backtrader.order",
]
disable_error_code = ["method-assign", "attr-defined", "has-type", "assignment", "index"]

# Core line system (lineroot/linebuffer/lineseries/lineiterator): the dynamic
# foundation of the framework — donew() mixins, runtime _owner/_OwnerCls and
# lines attributes, and __getitem__/operators provided only by concrete
# subclasses or via line bindings. These produce inherent false positives, so
# disable the dynamic-pattern codes for the whole quartet.
[[tool.mypy.overrides]]
module = [
    "backtrader.lineroot",
    "backtrader.linebuffer",
    "backtrader.lineseries",
    "backtrader.lineiterator",
]
disable_error_code = [
    "method-assign",
    "attr-defined",
    "has-type",
    "assignment",
    "misc",
    "union-attr",
    "operator",
    "index",
    "override",
    "arg-type",
    "call-overload",
]

[[tool.mypy.overrides]]
module = [
    "backtrader.observers.*",
    "backtrader.indicators.*",
    "backtrader.analyzers.*",
    "backtrader.filters.*",
]
disable_error_code = [
    "attr-defined",
    "assignment",
    "index",
    "call-arg",
    "misc",
    "operator",
    "union-attr",
    "has-type",
    "arg-type",
    "type-var",
]

[[tool.mypy.overrides]]
module = [
    "backtrader.plot.*",
    "backtrader.bokeh.*",
]
disable_error_code = ["attr-defined", "union-attr", "assignment"]

[[tool.mypy.overrides]]
module = [
    "backtrader.cerebro",
    "backtrader.strategy",
    "backtrader.timer",
    "backtrader.talib",
    "backtrader.functions",
    "backtrader.brokers.*",
    "backtrader.feeds.*",
    "backtrader.stores.*",
]
disable_error_code = ["attr-defined", "union-attr", "assignment", "no-any-return"]

[tool.coverage.run]
source = ["backtrader"]
omit = [
    "*/tests/*",
    "*/test_*",
    "setup.py",
    "*/crypto_tests/*"
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.bandit]
skips = ["B101", "B601"]
exclude_dirs = ["tests", "crypto_tests"]

[tool.isort]
profile = "black"
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 100
skip = [
    "backtrader/__init__.py",
    "backtrader/indicators/__init__.py",
]

[tool.ruff]
line-length = 100
target-version = "py38"

[tool.ruff.lint]
# Round 2 / R2-S1: expanded from the original ["E", "F"] to add high-value
# quality families. PIE and C4 are fully clean (auto-fixed). RET and SIM are
# enabled but a handful of *subjective* or *intentional* subcodes are ignored
# below (collapsible-if, if/else-vs-ternary readability calls, deliberately
# suppressed exceptions documented in Round 1, and intentionally long-lived
# file handles in data feeds). This堵住了一大类隐患的回流（可变默认参数等在 B 族，
# 见 R2-S2/批次 3）。
select = ["E", "F", "PIE", "C4", "RET", "SIM", "B"]
ignore = [
    "E501",     # line length handled by black
    # --- RET: subjective / behavior-preserving-but-risky in complex funcs ---
    "RET504",   # unnecessary-assign: removing `x = f(); return x` hurts debugging
    "RET503",   # implicit-return: explicit `return None` not required everywhere
    # --- SIM: subjective readability or intentional patterns ---
    "SIM102",   # collapsible-if: nested ifs are often clearer with comments
    "SIM108",   # if-else-block-instead-of-if-exp: ternary not always clearer
    "SIM105",   # suppressible-exception: Round 1 deliberately keeps commented
                #   defensive try/except blocks; contextlib.suppress drops the
                #   explanatory comment. Do NOT force-convert (see plan R2-S1).
    "SIM115",   # open-file-without-context: data feeds open in start()/close in
                #   stop() by design (long-lived handle), not a leak.
    "SIM103",   # needless-bool: explicit if/return reads fine in validators
    "SIM113",   # enumerate-for-loop: manual counter sometimes intentional
    "SIM118",   # in-dict-keys: `in d.keys()` kept where d is a dynamic mapping
    "SIM110",   # reimplemented-builtin (any/all): explicit loop kept on the
                #   clock-replay hot path to avoid generator overhead questions
    # --- B (bugbear): real correctness codes (B006/B023) are FIXED in source.
    #     The remaining codes below are cosmetic or intentional and live mostly
    #     in the dynamic line-system hot path — churning them risks zero-breakage
    #     for no user benefit (see plan R2-S1 batch 3 / R2-S2). ---
    "B007",     # unused-loop-control-variable: cosmetic (rename to _)
    "B010",     # set-attr-with-constant: setattr(o,"x",v) used for dynamic attrs
    "B009",     # get-attr-with-constant: mirror of B010
    "B026",     # star-arg-after-keyword: intentional in _add_timer (documented)
    "B004",     # unreliable-callable-check: hasattr(__call__) in line system
    "B018",     # useless-expression: line-system attribute-touch side effects
    "B027",     # empty-method-without-abstract: intentional optional hooks
    "B028",     # no-explicit-stacklevel in warnings: low value
]

[tool.ruff.lint.per-file-ignores]
"backtrader/observers/__init__.py" = ["F403"]
"backtrader/sizers/__init__.py" = ["F403"]
"backtrader/utils/__init__.py" = ["F403"]
"backtrader/lineseries.py" = ["E743"]
"backtrader/indicators/__init__.py" = ["F403"]
"backtrader/filters/__init__.py" = ["F403"]
"backtrader/analyzers/__init__.py" = ["F403"]
"backtrader/feeds/__init__.py" = ["F403"]
"backtrader/__init__.py" = ["F401", "F403"]
# Tests: E402 (imports after sys.path setup), E741 (single-letter vars), E722 (bare except),
# E712 (assert x == True/False), E721 (type() comparison), E731 (lambda), F811 (redefinition)
"tests/**/*.py" = ["E402", "E741", "E722", "E712", "E721", "E731", "F811"]