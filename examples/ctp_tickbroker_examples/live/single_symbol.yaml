strategy: single_symbol
symbols:
- rb2605
simnow_env: auto
run_timeout_seconds: 150
broker:
  force_refresh_queries: true
  account_refresh_interval: 0.0
  positions_refresh_interval: 0.0
  open_orders_refresh_interval: 0.0
feed:
  timeframe: ticks
  compression: 1
  backfill_start: false
strategy_params:
  symbol: rb2605
  tick_window: 2
  entry_bias: 0.0
  exit_bias: 0.0
  order_size: 1
  max_roundtrips: 1
  open_offset: open
  close_offset: close_today
  stop_after_ticks: 150
  printlog: true
  force_entry_after_ticks: 2
  force_exit_after_ticks: 6
  cancel_pending_after_ticks: 12
