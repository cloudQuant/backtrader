strategy: pair_arbitrage
symbols:
- rb2605
- hc2605
simnow_env: auto
run_timeout_seconds: 300
broker:
  force_refresh_queries: true
  account_refresh_interval: 0.0
  positions_refresh_interval: 0.0
  open_orders_refresh_interval: 0.0
feed:
  timeframe: seconds
  compression: 1
  backfill_start: false
strategy_params:
  symbol_a: rb2605
  symbol_b: hc2605
  bar_window: 2
  entry_edge: 0.0
  exit_edge: 0.0
  order_size: 1
  max_roundtrips: 1
  open_offset: open
  close_offset: close_today
  stop_after_ticks: 300
  printlog: true
  force_entry_after_ticks: 3
  force_exit_after_ticks: 10
  cancel_pending_after_ticks: 0
