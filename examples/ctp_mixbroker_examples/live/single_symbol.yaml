strategy: single_symbol
symbols:
- rb2605
simnow_env: auto
run_timeout_seconds: 240
broker:
  force_refresh_queries: false
  account_refresh_interval: 3600.0
  positions_refresh_interval: 3600.0
  open_orders_refresh_interval: 3600.0
feed:
  timeframe: ticks
  compression: 1
  backfill_start: false
strategy_params:
  symbol: rb2605
  bar_window: 2
  bar_source: ticks
  bar_seconds: 1
  entry_bias: 0.0
  exit_bias: 0.0
  order_size: 1
  max_roundtrips: 1
  open_offset: open
  close_offset: close_today
  stop_after_ticks: 240
  printlog: true
  force_entry_after_ticks: 2
  force_exit_after_ticks: 8
  cancel_pending_after_ticks: 0
trade_logger:
  log_value: false
  log_positions: false
  log_position_snapshot: false
