# Pytest configuration for Backtrader test suite

[tool:pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for priority levels
markers =
    priority_p0: Critical tests - core functionality, revenue-impacting, security-critical
    priority_p1: High priority tests - core user journeys, frequently used features
    priority_p2: Medium priority tests - secondary features, admin functionality
    priority_p3: Low priority tests - rarely used features, nice-to-have
    integration: Integration tests requiring live exchange connectivity
    websocket: WebSocket-specific integration tests
    trading: Tests that place real orders on sandbox exchange

# Output options
addopts =
    -v
    --strict-markers
    --tb=short

# Test paths
testpaths = tests

# Minimum version
minversion = 3.8

# Warning handling
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
