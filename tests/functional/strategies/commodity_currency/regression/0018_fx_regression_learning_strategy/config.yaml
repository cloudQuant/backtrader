strategy:
  id: '0400'
  name: FX Regression Learning Strategy
  source_spec: research_papers_gold/strategy_specs/commodity_currency/0400_FX_Regression_Learning_Strategy.md

data:
  symbol: EURUSD
  timeframe: D1
  file: /Users/yunjinqi/Documents/new_projects/backtrader/tests/datas/mt5_1d_data/EURUSD_1d.csv
  fromdate: '2022-01-01 00:00:00'
  todate: '2025-12-31 00:00:00'

params:
