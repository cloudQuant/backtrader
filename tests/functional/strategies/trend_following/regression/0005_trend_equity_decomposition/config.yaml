strategy:
  id: '0215'
  name: Trend Equity Decomposition
  source_spec: research_papers_gold/strategy_specs/trend_following/0215_Trend_Equity_Decomposition.md

data:
  symbol: XAUUSD
  timeframe: D1
  file: /Users/yunjinqi/Documents/new_projects/backtrader/tests/datas/mt5_1d_data/XAUUSD_1d.csv
  fromdate: '2008-01-01 00:00:00'
  todate: '2025-12-31 00:00:00'

params:
  fast_ma: 50
  slow_ma: 200
  momentum_window: 63
  volatility_window_fast: 21
  volatility_window_slow: 63
  decomposition_type: put_overlay
  require_confirmation: true
  rebalance_interval_days: 5

backtest:
  initial_cash: 1000000
  commission: 0.0002
  margin: 0.01
  multiplier: 100.0
  commission_type: percent
  stocklike: false

outputs:
  local_result_json: backtest_result.json
  global_summary_csv: ../../strategy_backtest_results.csv
