strategy:
  id: "0016"
  name: "Gold FOMC Effect"
  type: "event_driven"

data:
  symbol: "XAUUSD"
  timeframe: "D1"
  file: "/Users/yunjinqi/Documents/new_projects/backtrader/tests/datas/mt5_1d_data/XAUUSD_1d.csv"
  fromdate: "2008-01-01 00:00:00"
  todate: "2025-12-31 00:00:00"

params:
