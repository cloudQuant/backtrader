strategy:
  id: "0042"
  name: "Gold Multi Pair Trading"
  type: "pairs_trading"
  source_spec: "research_papers_gold/strategy_specs/pairs_trading/0042_Gold_Multi_Pair_Trading.md"

data:
  timeframe: "D1"
  fromdate: "2010-01-01 00:00:00"
  todate: "2025-12-31 00:00:00"
  gold_symbol: "XAUUSD"
  pair_symbols:
    - "XAGUSD"
    - "XPTUSD"
    - "XPDUSD"
  gold_file: "/Users/yunjinqi/Documents/new_projects/backtrader/tests/datas/mt5_1d_data/XAUUSD_1d.csv"
  pair_files:
    XAGUSD: "/Users/yunjinqi/Documents/new_projects/backtrader/tests/datas/mt5_1d_data/XAGUSD_1d.csv"
    XPTUSD: "/Users/yunjinqi/Documents/new_projects/backtrader/tests/datas/mt5_1d_data/XPTUSD_1d.csv"
    XPDUSD: "/Users/yunjinqi/Documents/new_projects/backtrader/tests/datas/mt5_1d_data/XPDUSD_1d.csv"

params:
