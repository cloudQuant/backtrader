  name: Dual Asset Leveraged Portfolio Strategy
  source_spec: research_papers_gold/strategy_specs/asset_allocation/0277_Dual_Asset_Leveraged_Portfolio_Strategy.md

data:
  assets:
    ivv: /Users/yunjinqi/Documents/new_projects/backtrader/tests/datas/mt5_1d_data/IVV_1d.csv
    xauusd: /Users/yunjinqi/Documents/new_projects/backtrader/tests/datas/XAUUSD_1d.csv
  timeframe: D1
