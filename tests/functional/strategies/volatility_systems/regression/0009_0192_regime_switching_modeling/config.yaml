strategy:
  id: '0192'
  name: Regime Switching Modeling
  source_spec: research_papers_gold/strategy_specs/volatility_regime/0192_Regime_Switching_Modeling.md

data:
  symbol: XAUUSD
  timeframe: D1
  file: /Users/yunjinqi/Documents/new_projects/backtrader/tests/datas/mt5_1d_data/XAUUSD_1d.csv
  fromdate: '2024-01-01 00:00:00'
  todate: '2025-12-31 00:00:00'

params:
  n_states: 2
  train_window: 252
  retrain_interval: 21
  volatility_window: 21
  momentum_window: 63
  min_state_prob: 0.55
  min_persistence_prob: 0.55
  bull_volatility_threshold: 0.018
  neutral_exposure: 0.35
  short_exposure: 0.50
  allow_short: true
  random_state: 42

backtest:
  initial_cash: 1000000
  commission: 0.0002

outputs:
  local_result_json: backtest_result.json
  global_summary_csv: ../../strategy_backtest_results.csv
