strategy:
  id: '0206'
  name: Volatility Long Memory
  source_spec: research_papers_gold/strategy_specs/volatility_regime/0206_Volatility_Long_Memory.md

data:
  symbol: XAUUSD
  timeframe: D1
  file: /Users/yunjinqi/Documents/new_projects/backtrader/tests/datas/mt5_1d_data/XAUUSD_1d.csv
  fromdate: '2008-01-01 00:00:00'
  todate: '2025-12-31 00:00:00'

params:
  vol_window: 21
  hurst_window: 252
  regime_compare_window: 63
  min_lag: 2
  max_lag: 20
  trend_threshold: 0.55
  trend_strong_threshold: 0.60
  mean_reversion_threshold: 0.45
  mean_reversion_strong_threshold: 0.40
  regime_change_threshold: 0.10
  fast_ma_period: 20
  slow_ma_period: 50
  momentum_window: 21
  mean_window: 20
  zscore_entry_threshold: 1.5
  zscore_exit_threshold: 0.35
  rsi_period: 14
  rsi_oversold: 35
  rsi_overbought: 65
  neutral_exposure: 0.25
  moderate_exposure: 0.75
  strong_exposure: 1.0
  regime_change_exposure: 0.25
  min_exposure_change: 0.05
  allow_short: true

backtest:
  initial_cash: 1000000
  commission: 0.0002

outputs:
  local_result_json: backtest_result.json
  global_summary_csv: ../../strategy_backtest_results.csv
