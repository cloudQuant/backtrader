strategy:
  id: '0411'
  name: HMM Random Forest Strategy
  source_spec: research_papers_gold/strategy_specs/volatility_regime/0411_HMM_Random_Forest_Strategy.md

data:
  symbol: XAUUSD
  timeframe: D1
  file: /Users/yunjinqi/Documents/new_projects/backtrader/tests/datas/XAUUSD_1d.csv
  feature_cache_dir: features
  fromdate: '2024-09-01 00:00:00'
  todate: '2025-12-31 00:00:00'
  bar_shift_minutes: 0

params:
  train_window: 252
  retrain_interval: 21
  n_states: 3
  covariance_type: full
  n_iter: 100
  n_estimators: 200
  max_depth: 8
  min_samples_split: 10
  signal_threshold: 0.60
  base_target_percent: 0.20
  max_target_percent: 0.75
  returns_window: 5
  volatility_window: 21
  momentum_window: 10
  random_state: 42

backtest:
  initial_cash: 1000000
  commission: 0.0002
  margin: 0.01
  multiplier: 100.0
  commission_type: percent
  stocklike: false

outputs:
  local_result_json: backtest_result.json
  global_summary_csv: ../../strategy_backtest_results.csv
