strategy:
  id: '0415'
  name: Sentiment Signal Strategy
  source_spec: research_papers_gold/strategy_specs/machine_learning/0415_Sentiment_Signal_Strategy.md

data:
  symbol: XAUUSD
  timeframe: D1
  file: /Users/yunjinqi/Documents/new_projects/backtrader/tests/datas/XAUUSD_1d.csv
  fromdate: '2008-01-01 00:00:00'
  todate: '2025-12-31 00:00:00'
  bar_shift_minutes: 0

params:
  sentiment_window: 30
  threshold: 0.15
  holding_period: 21
  max_exposure: 1.0
  return_z_window: 20
  volume_window: 30
  volume_impact_weight: 0.5

backtest:
  initial_cash: 1000000
  commission: 0.0002
  margin: 0.01
  multiplier: 100.0
  commission_type: percent
  stocklike: false

outputs:
  local_result_json: backtest_result.json
  global_summary_csv: ../../strategy_backtest_results.csv
